databases:
  - name: skincare-db
    databaseName: skincare_factory
    user: skincare
    plan: free

services:
  # ── Backend API (FastAPI + Docker) ───────────────────────────────────────
  - type: web
    name: skincare-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skincare-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-pro
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"

  # ── Frontend (React static site, served by Render CDN) ───────────────────
  - type: web
    name: skincare-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
