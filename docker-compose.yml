version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: skincare_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-skincare_factory}
      POSTGRES_USER: ${POSTGRES_USER:-skincare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skincare_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-skincare} -d ${POSTGRES_DB:-skincare_factory}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skincare_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-skincare}:${POSTGRES_PASSWORD:-skincare_pass}@db:5432/${POSTGRES_DB:-skincare_factory}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skincare_frontend
    restart: unless-stopped
    environment:
      PORT: "80"
      BACKEND_URL: "http://backend:8000"
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
